name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: vet
        run: |
          go vet ./...
          go vet -tags integration ./...

      - name: unit tests
        run: go test ./...

      # Print the colored kitchen-sink so the pretty console output is
      # eyeball-able in the Actions log (GitHub renders ANSI).
      - name: pretty (eyeball)
        run: ./bin/test pretty

      # Stands up otelcol-contrib (docker compose is preinstalled on the
      # runner), runs the OTLP roundtrip, tears it down.
      - name: integration tests
        run: ./bin/test ci
